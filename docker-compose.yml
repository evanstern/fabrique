services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fabrique
    restart: unless-stopped
    ports:
      - "${APP_HOST_PORT:-8422}:3000"
    environment:
      NODE_ENV: production
      MONGO_URL: ${MONGO_URL:?MONGO_URL is required (see .env.example)}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required (see .env.example)}
      FABRIQUE_PASSWORD: ${FABRIQUE_PASSWORD:?FABRIQUE_PASSWORD is required (see .env.example)}
      FABRIQUE_AUTH_SECRET: ${FABRIQUE_AUTH_SECRET:?FABRIQUE_AUTH_SECRET is required (see .env.example)}
      ARTIFACTS_DIR: /app/artifacts
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8422}
    volumes:
      - ./artifacts:/app/artifacts
